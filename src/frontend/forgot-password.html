<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - SmartLearn</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .forgot-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .forgot-card {
            background: white;
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.5s ease-out;
            text-align: center;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .forgot-logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .forgot-logo i { font-size: 2rem; color: white; }
        .forgot-title { margin-bottom: 8px; font-size: 1.75rem; font-weight: 700; color: #1f2937; }
        .forgot-subtitle { color: #6b7280; margin-bottom: 32px; line-height: 1.5; }
        .forgot-form .form-group { margin-bottom: 20px; text-align: left; }
        .forgot-form label { display: block; font-size: 0.9rem; font-weight: 500; color: #374151; margin-bottom: 8px; }
        .forgot-form .input-wrapper { position: relative; }
        .forgot-form .input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
        .forgot-form input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        .forgot-form input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        
        .btn-forgot {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-forgot:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); }
        
        .forgot-footer { margin-top: 24px; color: #6b7280; }
        .forgot-footer a { color: #4f46e5; text-decoration: none; font-weight: 600; }
        .forgot-footer a:hover { text-decoration: underline; }
        .forgot-back { margin-top: 16px; }
        .forgot-back a { display: inline-flex; align-items: center; gap: 6px; color: #9ca3af; text-decoration: none; font-size: 0.9rem; }
        .forgot-back a:hover { color: #4f46e5; }
    </style>
</head>
<body>
    <div class="forgot-page">
        <div class="forgot-card">
            <div class="forgot-logo"><i class="fas fa-key"></i></div>
            <h1 class="forgot-title">Quên mật khẩu?</h1>
            <p class="forgot-subtitle">Nhập email của bạn và chúng tôi sẽ gửi liên kết để khôi phục mật khẩu</p>
            
            <form id="forgotForm" class="forgot-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Nhập email của bạn" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-forgot">Gửi liên kết khôi phục</button>
            </form>
            
            <div class="forgot-footer">
                Nhớ mật khẩu rồi? <a href="login.html">Đăng nhập ngay</a>
            </div>
            
            <div class="forgot-back">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Về trang chủ</a>
            </div>
        </div>
    </div>
    
    <div id="message" class="message"></div>
    <script src="js/auth.js"></script>
</body>
</html>
